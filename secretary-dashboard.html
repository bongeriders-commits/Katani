<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Secretary Dashboard - Katani Main Stage</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d2140">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Katani Stage">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="auth.js"></script>
<link rel="stylesheet" href="desktop.css">
<style>
:root{
  --navy:#0d2140; --navy-dark:#0a1830; --gold:#f5a623; --muted:#6b7685; --border:#e3e7ee; --gray-bg:#f4f6f9;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;font-family:'Segoe UI',Roboto,-apple-system,BlinkMacSystemFont,sans-serif;}
html,body{height:100%;}
body{background:#1a1a1a;overflow-x:hidden;}
#app{max-width:480px;margin:0 auto;background:var(--gray-bg);min-height:100vh;position:relative;box-shadow:0 0 40px rgba(0,0,0,0.4);padding-bottom:30px;}
header.topbar{
  background:linear-gradient(180deg, rgba(13,33,64,0.65) 0%, rgba(13,33,64,0.8) 70%, rgba(13,33,64,0.94) 100%), url('hero-bg.jpg');
  background-size:cover;background-position:center;padding:16px 18px 44px;position:relative;
}
.hdr-row{display:flex;align-items:flex-start;gap:14px;}
.icon-btn{width:38px;height:38px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.08);border:none;border-radius:10px;color:#fff;cursor:pointer;flex-shrink:0;}
.icon-btn svg{width:20px;height:20px;}
.logo-wrap{width:74px;height:74px;border-radius:50%;overflow:hidden;border:3px solid #fff;box-shadow:0 4px 14px rgba(0,0,0,0.35);flex-shrink:0;background:#fff;}
.logo-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
.hdr-text{flex:1;min-width:0;}
.hdr-text h1{color:#fff;font-size:17.5px;font-weight:800;line-height:1.3;text-transform:uppercase;}
.hdr-text h1 .accent{color:var(--gold);}
.hdr-text .admin-tag{color:var(--gold);font-size:12.5px;font-weight:700;margin-top:3px;}
.main-card{background:#fff;border-radius:22px 22px 0 0;margin-top:-28px;position:relative;z-index:2;padding:22px 18px 4px;}
.page-head-left h2{font-size:21px;font-weight:800;color:var(--navy-dark);}
.page-head-left p{font-size:12.5px;color:var(--muted);margin-top:3px;margin-bottom:20px;}
.menu-list{display:flex;flex-direction:column;gap:10px;}
.menu-item{
  display:flex;align-items:center;gap:14px;width:100%;background:#fff;border:1.5px solid var(--border);
  border-radius:14px;padding:15px 16px;cursor:pointer;text-align:left;font-size:13.5px;font-weight:700;color:var(--navy-dark);
  box-shadow:0 4px 14px rgba(13,33,64,0.05);
}
.menu-item:active{transform:scale(0.98);}
.menu-item svg{width:19px;height:19px;color:var(--navy);flex-shrink:0;}
.menu-item .mi-sub{display:block;font-size:11.5px;font-weight:500;color:var(--muted);margin-top:2px;}
.profile-strip{display:flex;align-items:center;gap:12px;margin-bottom:20px;background:#f4f6f9;border-radius:14px;padding:14px 16px;}
.profile-strip .pav{width:42px;height:42px;border-radius:50%;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0;}
.profile-strip h4{font-size:13.5px;font-weight:800;color:var(--navy-dark);}
.profile-strip p{font-size:11.5px;color:var(--muted);}
.strip-actions{margin-left:auto;display:flex;gap:8px;}
.strip-actions button{background:none;border:none;font-size:11px;font-weight:700;color:var(--navy);cursor:pointer;text-decoration:underline;}

.member-modal-overlay{position:fixed;inset:0;background:rgba(10,24,48,0.55);display:flex;align-items:flex-end;justify-content:center;opacity:0;visibility:hidden;transition:.2s;z-index:50;}
.member-modal-overlay.open{opacity:1;visibility:visible;}
.member-modal{background:#fff;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;border-radius:20px 20px 0 0;padding:20px 18px 26px;}
.mm-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.mm-head h3{font-size:16px;font-weight:800;color:var(--navy-dark);}
.mm-close{background:#f1f3f7;border:none;width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;color:var(--navy-dark);cursor:pointer;}
.mm-close svg{width:16px;height:16px;}
.mm-field{margin-bottom:14px;}
.mm-field label{display:block;font-size:12px;font-weight:700;color:var(--navy-dark);margin-bottom:6px;}
.mm-field input,.mm-field textarea{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:11px 13px;font-size:13.5px;font-family:inherit;outline:none;color:#1a1a1a;}
.mm-field textarea{min-height:110px;resize:vertical;}
.mm-save-btn{width:100%;background:var(--gold);color:var(--navy-dark);border:none;border-radius:12px;padding:14px;font-size:14px;font-weight:800;cursor:pointer;margin-top:4px;}
.mm-error{color:#c0392b;font-size:11.5px;margin-top:6px;display:none;}
.mm-error.show{display:block;}

#toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--navy-dark);color:#fff;padding:12px 18px;border-radius:10px;font-size:12.5px;font-weight:600;opacity:0;visibility:hidden;transition:.25s;z-index:99;max-width:90%;text-align:center;}
#toast.show{opacity:1;visibility:visible;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div id="app">
  <header class="topbar">
    <div class="hdr-row">
      <div class="logo-wrap"><img src="icon-192.png" alt="Katani Main Stage"></div>
      <div class="hdr-text">
        <h1>KATANI <span class="accent">MAIN STAGE</span></h1>
        <div class="admin-tag">Secretary Dashboard</div>
      </div>
      <button class="icon-btn" onclick="handleLogout()" aria-label="Log out">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </header>

  <div class="main-card">
    <div class="page-head-left">
      <h2>Welcome, Secretary</h2>
      <p>Manage members, announcements &amp; meeting minutes.</p>
    </div>

    <div class="profile-strip">
      <div class="pav" id="secInitials">S</div>
      <div>
        <h4 id="secName">—</h4>
        <p id="secEmail">—</p>
      </div>
      <div class="strip-actions">
        <button onclick="window.location.href='role-select.html'">Switch role</button>
      </div>
    </div>

    <div class="menu-list">
      <button class="menu-item" onclick="location.href='members-directory.html?add=1'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="16" y1="11" x2="22" y2="11"/></svg>
        <span>Add Member<span class="mi-sub">Register a new member</span></span>
      </button>
      <button class="menu-item" onclick="location.href='members-directory.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span>Members Directory<span class="mi-sub">View, edit &amp; print as PDF</span></span>
      </button>
      <button class="menu-item" onclick="openSendAnnouncement()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l18-5v12L3 14v-3z"/><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/></svg>
        <span>Send Announcement<span class="mi-sub">Broadcast to all members</span></span>
      </button>
      <button class="menu-item" onclick="location.href='minutes.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        <span>Meeting Minutes<span class="mi-sub">Write, save &amp; print</span></span>
      </button>
    </div>
  </div>
</div>

<div id="toast"></div>

<!-- Send Announcement modal -->
<div class="member-modal-overlay" id="announcementOverlay" onclick="if(event.target===this) closeSendAnnouncement()">
  <div class="member-modal">
    <div class="mm-head">
      <h3>Send Announcement</h3>
      <button class="mm-close" onclick="closeSendAnnouncement()" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="mm-field">
      <label>Title</label>
      <input type="text" id="ann-title" placeholder="e.g. Meeting this Sunday">
    </div>
    <div class="mm-field">
      <label>Message</label>
      <textarea id="ann-message" placeholder="Write the announcement for all members..."></textarea>
    </div>
    <div class="mm-error" id="ann-error"></div>
    <button class="mm-save-btn" onclick="submitSendAnnouncement()">Send Announcement</button>
  </div>
</div>

<script>
let currentSecretary = null;

function initials(name){
  return (name || '').split(' ').map(n => n[0]).join('').slice(0,2).toUpperCase() || 'S';
}

function showToast(msg){
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => toast.classList.remove('show'), 2400);
}

async function handleLogout(){
  await KatiniAuth.logout();
  window.location.href = 'index.html';
}

function openSendAnnouncement(){
  document.getElementById('ann-title').value = '';
  document.getElementById('ann-message').value = '';
  document.getElementById('ann-error').classList.remove('show');
  document.getElementById('announcementOverlay').classList.add('open');
}
function closeSendAnnouncement(){
  document.getElementById('announcementOverlay').classList.remove('open');
}
async function submitSendAnnouncement(){
  const title = document.getElementById('ann-title').value.trim();
  const message = document.getElementById('ann-message').value.trim();
  const err = document.getElementById('ann-error');
  if(!title || !message){
    err.textContent = 'Enter both a title and a message.';
    err.classList.add('show');
    return;
  }
  const result = await KatiniAuth.sendAnnouncement({
    title: title,
    message: message,
    sentBy: currentSecretary ? currentSecretary.email : '',
    sentByName: currentSecretary ? currentSecretary.name + ' (Secretary)' : 'Secretary'
  });
  if(!result.success){
    err.textContent = result.message;
    err.classList.add('show');
    return;
  }
  closeSendAnnouncement();
  showToast('Announcement sent to all members');
}

(async function(){
  await KatiniAuth.ready;
  const user = await KatiniAuth.requireRole(['admin','secretary']);
  if(!user) return;
  currentSecretary = user;
  document.getElementById('secName').textContent = user.name;
  document.getElementById('secEmail').textContent = user.email;
  document.getElementById('secInitials').textContent = initials(user.name);
  if(user.role === 'admin'){
    document.querySelector('.strip-actions').style.display = 'none';
  }
})();
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js').catch(() => {});
  });
}
</script>
</body>
</html>
