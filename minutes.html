<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Meeting Minutes - Katani Main Stage</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d2140">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Katani Stage">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="auth.js"></script>
<style>
:root{
  --navy:#0d2140;
  --navy-dark:#0a1830;
  --navy-card:#11294f;
  --gold:#f5a623;
  --green:#2e7d32;
  --green-light:#43a047;
  --red:#c0392b;
  --blue:#1565c0;
  --purple:#6a3fc0;
  --gray-bg:#f4f6f9;
  --text-light:#c9d3e0;
  --border:#e3e7ee;
  --muted:#6b7685;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;font-family:'Segoe UI',Roboto,-apple-system,BlinkMacSystemFont,sans-serif;}
html,body{height:100%;}
body{background:#1a1a1a;color:#1a1a1a;overflow-x:hidden;}

#app{
  max-width:480px;margin:0 auto;background:var(--gray-bg);
  min-height:100vh;position:relative;box-shadow:0 0 40px rgba(0,0,0,0.4);
  padding-bottom:96px;
}

/* ---------- Header (shared) ---------- */
header.topbar{
  background:
    linear-gradient(180deg, rgba(13,33,64,0.65) 0%, rgba(13,33,64,0.8) 70%, rgba(13,33,64,0.94) 100%),
    url('hero-bg.jpg');
  background-size:cover;background-position:center;
  padding:16px 18px 44px;position:relative;
}
.hdr-row{display:flex;align-items:flex-start;gap:14px;}
.icon-btn{
  width:38px;height:38px;display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,0.08);border:none;border-radius:10px;color:#fff;cursor:pointer;
  flex-shrink:0;position:relative;
}
.icon-btn svg{width:20px;height:20px;}
.badge{
  position:absolute;top:-6px;right:-6px;background:var(--gold);color:var(--navy-dark);
  font-size:10px;font-weight:800;width:18px;height:18px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;border:2px solid var(--navy-dark);
}
.logo-wrap{
  width:74px;height:74px;border-radius:50%;overflow:hidden;border:3px solid #fff;
  box-shadow:0 4px 14px rgba(0,0,0,0.35);flex-shrink:0;background:#fff;
}
.logo-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
.hdr-text{flex:1;min-width:0;}
.hdr-text h1{color:#fff;font-size:17.5px;font-weight:800;line-height:1.3;text-transform:uppercase;}
.hdr-text h1 .accent{color:var(--gold);}
.hdr-text .admin-tag{color:var(--gold);font-size:12.5px;font-weight:700;margin-top:3px;}

/* ---------- Main content overlap card ---------- */
.main-card{
  background:#fff;border-radius:22px 22px 0 0;margin-top:-28px;position:relative;z-index:2;
  padding:22px 18px 4px;
}

/* ---------- Page head row ---------- */
.page-head-row{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:18px;flex-wrap:wrap;}
.page-head-left h2{font-size:21px;font-weight:800;color:var(--navy-dark);}
.page-head-left p{font-size:12.5px;color:var(--muted);margin-top:3px;}
.btn-add{
  background:var(--navy);color:#fff;border:none;border-radius:12px;padding:11px 16px;
  font-size:12.5px;font-weight:700;display:flex;align-items:center;gap:8px;cursor:pointer;
  white-space:nowrap;box-shadow:0 6px 16px rgba(13,33,64,0.25);
}
.btn-add svg{width:15px;height:15px;}

/* ---------- Search + filter row ---------- */
.search-row{display:flex;gap:10px;margin-bottom:14px;}
.search-box{
  flex:1;display:flex;align-items:center;gap:8px;background:#fff;border:1.5px solid var(--border);
  border-radius:12px;padding:11px 14px;min-width:0;
}
.search-box svg{width:16px;height:16px;color:var(--muted);flex-shrink:0;}
.search-box input{
  border:none;outline:none;font-size:13px;flex:1;min-width:0;color:var(--navy-dark);background:transparent;
}
.search-box input::placeholder{color:#9aa3b0;}
.btn-filter{
  display:flex;align-items:center;gap:7px;background:#fff;border:1.5px solid var(--border);
  border-radius:12px;padding:11px 15px;font-size:12.5px;font-weight:700;color:var(--navy-dark);
  cursor:pointer;white-space:nowrap;
}
.btn-filter svg{width:14px;height:14px;color:var(--muted);}

/* ---------- Filter tabs ---------- */
.tab-scroll{display:flex;gap:9px;overflow-x:auto;padding-bottom:4px;margin-bottom:16px;scrollbar-width:none;}
.tab-scroll::-webkit-scrollbar{display:none;}
.tab-pill{
  display:flex;align-items:center;gap:7px;padding:10px 14px;border-radius:11px;border:1.5px solid var(--border);
  background:#fff;font-size:12.5px;font-weight:700;color:var(--navy-dark);white-space:nowrap;cursor:pointer;
  flex-shrink:0;
}
.tab-pill svg{width:14px;height:14px;}
.tab-pill.active{background:var(--navy);border-color:var(--navy);color:#fff;}
.tab-pill.active svg{color:#fff;}
.tab-pill.t-active svg{color:var(--green);}
.tab-pill.t-inactive svg{color:var(--gold);}
.tab-pill.t-suspended svg{color:var(--red);}

/* ---------- Member list ---------- */
.list-head{
  display:grid;grid-template-columns:1.7fr 1fr 0.4fr;gap:8px;padding:0 4px 10px;
  font-size:10.5px;font-weight:800;color:var(--muted);letter-spacing:.4px;text-transform:uppercase;
}
.member-card{
  background:#fff;border:1.5px solid var(--border);border-radius:14px;padding:12px 12px;
  display:flex;align-items:center;gap:12px;margin-bottom:10px;
}
.avatar{
  width:44px;height:44px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:800;color:#fff;
}
.m-info{flex:1;min-width:0;}
.m-info h4{font-size:13.5px;font-weight:700;color:var(--navy-dark);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.m-info .m-id{font-size:11px;color:var(--muted);margin-top:1px;}
.m-info .m-sub{display:flex;gap:12px;margin-top:5px;flex-wrap:wrap;}
.m-info .m-sub span{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px;}
.m-info .m-sub svg{width:11px;height:11px;}
.m-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0;}
.status-pill{
  font-size:10.5px;font-weight:800;padding:4px 10px;border-radius:20px;white-space:nowrap;
}
.status-pill.active{background:#e6f4ea;color:var(--green);}
.status-pill.inactive{background:#fef3e0;color:#b9791a;}
.status-pill.suspended{background:#fbe8e6;color:var(--red);}
.more-btn{
  width:26px;height:26px;border:none;background:none;color:var(--muted);cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;
}

/* ---------- Pagination ---------- */
.pagination{
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;
  padding:6px 4px 20px;
}
.pg-info{font-size:11.5px;color:var(--muted);}
.pg-controls{display:flex;align-items:center;gap:6px;}
.pg-btn{
  width:30px;height:30px;border-radius:8px;border:1.5px solid var(--border);background:#fff;
  color:var(--navy-dark);font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;
}
.pg-btn.active{background:var(--navy);border-color:var(--navy);color:#fff;}
.pg-btn svg{width:14px;height:14px;}
.pg-dots{color:var(--muted);font-size:12px;padding:0 2px;}

/* ---------- Bottom nav (shared) ---------- */
.bottom-nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--navy);
  display:grid;grid-template-columns:repeat(5,1fr);box-shadow:0 -4px 20px rgba(0,0,0,0.2);
  padding:10px 0 max(10px, env(safe-area-inset-bottom));z-index:50;align-items:center;
}
.nav-item{
  display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;
  cursor:pointer;color:var(--text-light);padding:6px 4px;font-size:9.5px;font-weight:700;border-radius:10px;
}
.nav-item svg{width:20px;height:20px;}
.nav-item.active{color:var(--navy-dark);background:var(--gold);margin:0 4px;}

/* Toast */
#toast{
  position:fixed;bottom:110px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--navy-dark);color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;
  z-index:400;opacity:0;transition:all .3s ease;pointer-events:none;box-shadow:0 8px 20px rgba(0,0,0,0.3);
  max-width:400px;text-align:center;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ---------- Member modal (Add / View) ---------- */
.member-modal-overlay{
  position:fixed;inset:0;z-index:700;background:rgba(10,20,40,0.6);
  opacity:0;visibility:hidden;transition:opacity .25s ease,visibility .25s ease;
  display:flex;align-items:flex-end;
}
.member-modal-overlay.open{opacity:1;visibility:visible;}
.member-modal{
  width:100%;max-width:480px;margin:0 auto;background:var(--gray-bg);border-radius:20px 20px 0 0;
  max-height:92vh;overflow-y:auto;transform:translateY(24px);transition:transform .25s ease;
  padding:20px 18px max(20px, env(safe-area-inset-bottom));
}
.member-modal-overlay.open .member-modal{transform:translateY(0);}
.mm-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.mm-head h3{font-size:16.5px;font-weight:800;color:var(--navy-dark);}
.mm-close{width:34px;height:34px;border-radius:50%;background:#fff;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 2px 8px rgba(13,33,64,0.1);flex-shrink:0;}
.mm-close svg{width:16px;height:16px;color:var(--navy-dark);}
.mm-section{background:#fff;border-radius:14px;padding:14px;box-shadow:0 3px 12px rgba(13,33,64,0.06);margin-bottom:14px;}
.mm-section h4{font-size:11.5px;font-weight:800;color:var(--navy);text-transform:uppercase;letter-spacing:.4px;margin-bottom:12px;display:flex;align-items:center;gap:7px;}
.mm-section h4 svg{width:14px;height:14px;color:var(--gold);}
.mm-field{margin-bottom:12px;}
.mm-field:last-child{margin-bottom:0;}
.mm-field label{display:block;font-size:11.5px;font-weight:700;color:var(--muted);margin-bottom:6px;}
.mm-field input,.mm-field select{
  width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;font-size:13px;
  color:var(--navy-dark);outline:none;background:#fff;
}
.mm-field input:focus,.mm-field select:focus{border-color:var(--navy);}
.mm-row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.mm-photo-row{display:flex;align-items:center;gap:14px;}
.mm-photo-preview{
  width:64px;height:64px;border-radius:50%;background:var(--gray-bg);border:1.5px dashed var(--border);
  display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;color:var(--muted);
}
.mm-photo-preview img{width:100%;height:100%;object-fit:cover;}
.mm-photo-btn{
  background:var(--navy);color:#fff;border:none;border-radius:10px;padding:9px 14px;font-size:12px;
  font-weight:700;cursor:pointer;
}
.mm-save-btn{
  width:100%;background:var(--navy);color:#fff;border:none;border-radius:12px;padding:14px;
  font-size:13.5px;font-weight:800;cursor:pointer;margin-top:4px;box-shadow:0 8px 20px rgba(13,33,64,0.3);
}
.mm-error{color:var(--red);font-size:11.5px;margin-top:6px;display:none;}
.mm-error.show{display:block;}

/* View-member detail sheet */
.vm-photo-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:16px;}
.vm-photo{
  width:84px;height:84px;border-radius:50%;background:var(--navy);color:var(--gold);font-weight:800;
  font-size:26px;display:flex;align-items:center;justify-content:center;overflow:hidden;box-shadow:0 4px 14px rgba(13,33,64,0.25);
}
.vm-photo img{width:100%;height:100%;object-fit:cover;}
.vm-photo-wrap h4{margin-top:10px;font-size:15.5px;font-weight:800;color:var(--navy-dark);}
.vm-photo-wrap p{font-size:12px;color:var(--muted);margin-top:2px;}
.vm-qr{display:flex;justify-content:center;padding:14px 0 4px;}
.vm-qr-box{background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:10px;}
.vm-row{display:flex;justify-content:space-between;gap:12px;padding:11px 0;border-bottom:1px solid var(--border);}
.vm-row:last-child{border-bottom:none;}
.vm-row .vk{font-size:12px;color:var(--muted);font-weight:600;}
.vm-row .vv{font-size:12.5px;color:var(--navy-dark);font-weight:700;text-align:right;}

/* ---------- Stat grid (collections summary) ---------- */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
.stat-card{background:#fff;border:1.5px solid var(--border);border-radius:14px;padding:16px;}
.stat-icon{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;}
.stat-icon svg{width:18px;height:18px;color:#fff;}
.stat-icon.green{background:var(--green);}
.stat-icon.gold{background:var(--gold);}
.stat-icon.navy{background:var(--navy);}
.stat-icon.red{background:var(--red);}
.stat-num{font-size:19px;font-weight:800;color:var(--navy-dark);}
.stat-label{font-size:11.5px;color:var(--muted);margin-top:2px;line-height:1.3;}

/* ---------- Type quick-select (Record Payment modal) ---------- */
.type-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px;}
.type-btn{
  display:flex;align-items:center;gap:9px;border:1.5px solid var(--border);border-radius:12px;
  padding:11px;background:#fff;font-size:12px;font-weight:700;color:var(--navy-dark);cursor:pointer;
}
.type-btn svg{width:16px;height:16px;color:var(--muted);flex-shrink:0;}
.type-btn.active{background:var(--navy);border-color:var(--navy);color:#fff;}
.type-btn.active svg{color:var(--gold);}

/* ---------- Transaction list ---------- */
.txn-card{
  background:#fff;border:1.5px solid var(--border);border-radius:14px;padding:12px;
  display:flex;align-items:center;gap:12px;margin-bottom:10px;
}
.txn-icon{width:42px;height:42px;border-radius:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.txn-icon svg{width:19px;height:19px;color:#fff;}
.txn-icon.contribution{background:var(--green);}
.txn-icon.registration{background:var(--gold);}
.txn-icon.fine{background:var(--red);}
.txn-icon.other{background:var(--purple);}
.txn-info{flex:1;min-width:0;}
.txn-info h4{font-size:13.5px;font-weight:700;color:var(--navy-dark);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.txn-info .txn-id{font-size:11px;color:var(--muted);margin-top:1px;}
.txn-info .txn-sub{display:flex;gap:10px;margin-top:5px;flex-wrap:wrap;}
.txn-info .txn-sub span{font-size:10.5px;color:var(--muted);font-weight:700;padding:2px 8px;border-radius:20px;background:var(--gray-bg);}
.txn-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;}
.txn-amount{font-size:14px;font-weight:800;color:var(--navy-dark);white-space:nowrap;}

/* ---------- Install app bar (PWA) ---------- */
.install-bar{
  position:fixed;left:50%;bottom:-140px;transform:translateX(-50%);width:100%;max-width:480px;
  background:var(--navy,#0d2140);color:#fff;z-index:500;padding:14px 16px;
  box-shadow:0 -6px 24px rgba(0,0,0,0.3);display:flex;align-items:center;gap:12px;
  transition:bottom .35s ease;border-radius:16px 16px 0 0;
}
.install-bar.show{bottom:0;}
.install-bar-icon{
  width:38px;height:38px;border-radius:10px;background:rgba(255,255,255,0.1);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;overflow:hidden;
}
.install-bar-icon img{width:100%;height:100%;object-fit:cover;}
.install-bar-text{flex:1;min-width:0;}
.install-bar-text strong{display:block;font-size:13px;font-weight:800;}
.install-bar-text span{display:block;font-size:11px;color:var(--text-light,#c9d3e0);margin-top:2px;line-height:1.35;}
.install-bar-btn{
  background:var(--gold,#f5a623);color:var(--navy-dark,#0a1830);border:none;border-radius:10px;
  padding:9px 14px;font-size:12px;font-weight:800;cursor:pointer;white-space:nowrap;flex-shrink:0;
}
.install-bar-close{
  background:none;border:none;color:#c9d3e0;font-size:20px;line-height:1;cursor:pointer;padding:2px 4px;flex-shrink:0;
}
</style>
<style>
.form-card{background:#fff;border:1.5px solid var(--border);border-radius:14px;padding:16px;margin-bottom:16px;}
.form-card h3{font-size:13px;font-weight:800;color:var(--navy);text-transform:uppercase;letter-spacing:.4px;margin-bottom:14px;display:flex;align-items:center;gap:7px;}
.form-card h3 svg{width:15px;height:15px;color:var(--gold);}
.f-field{margin-bottom:14px;}
.f-field:last-child{margin-bottom:0;}
.f-field label{display:block;font-size:11.5px;font-weight:700;color:var(--muted);margin-bottom:6px;}
.f-field input,.f-field textarea{
  width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;font-size:13px;
  color:var(--navy-dark);outline:none;background:#fff;font-family:inherit;
}
.f-field textarea{resize:vertical;min-height:70px;}
.f-field input:focus,.f-field textarea:focus{border-color:var(--navy);}

.present-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.present-count{font-size:11.5px;color:var(--muted);font-weight:700;}
.select-all-btn{background:none;border:1.5px solid var(--border);border-radius:9px;padding:6px 12px;font-size:11.5px;font-weight:700;color:var(--navy);cursor:pointer;}
.present-list{max-height:280px;overflow-y:auto;border:1.5px solid var(--border);border-radius:12px;}
.present-row{display:flex;align-items:center;gap:12px;padding:11px 12px;border-bottom:1px solid var(--border);}
.present-row:last-child{border-bottom:none;}
.present-row input[type=checkbox]{width:19px;height:19px;flex-shrink:0;accent-color:var(--navy);}
.pr-avatar{width:34px;height:34px;border-radius:50%;background:var(--navy);color:var(--gold);font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.pr-info{flex:1;min-width:0;}
.pr-info .pr-name{font-size:13px;font-weight:700;color:var(--navy-dark);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pr-info .pr-id{font-size:10.5px;color:var(--muted);}

.agenda-item{background:var(--gray-bg);border-radius:12px;padding:12px;margin-bottom:10px;position:relative;}
.agenda-item .ai-num{font-size:10.5px;font-weight:800;color:var(--gold);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
.ai-remove{background:none;border:none;color:var(--red);font-size:11px;font-weight:700;cursor:pointer;padding:2px 6px;}
.add-agenda-btn{
  width:100%;background:none;border:1.5px dashed var(--border);border-radius:12px;padding:12px;
  font-size:12.5px;font-weight:700;color:var(--navy);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
}
.add-agenda-btn svg{width:15px;height:15px;}

.action-row{display:flex;gap:10px;margin-bottom:26px;}
.btn-save{
  flex:1;background:var(--navy);color:#fff;border:none;border-radius:12px;padding:14px;
  font-size:13.5px;font-weight:800;cursor:pointer;box-shadow:0 8px 20px rgba(13,33,64,0.3);
}
.btn-pdf{
  flex:1;background:var(--gold);color:var(--navy-dark);border:none;border-radius:12px;padding:14px;
  font-size:13.5px;font-weight:800;cursor:pointer;box-shadow:0 8px 20px rgba(245,166,35,0.3);
}

.saved-card{background:#fff;border:1.5px solid var(--border);border-radius:14px;padding:12px 14px;margin-bottom:10px;}
.saved-card h4{font-size:13.5px;font-weight:700;color:var(--navy-dark);}
.saved-card .sc-sub{font-size:11.5px;color:var(--muted);margin-top:3px;}
.saved-card .sc-actions{display:flex;gap:8px;margin-top:10px;}
.sc-btn{flex:1;border:1.5px solid var(--border);background:#fff;border-radius:9px;padding:8px;font-size:11.5px;font-weight:700;color:var(--navy);cursor:pointer;}
.sc-btn.danger{color:var(--red);}
.empty-state{text-align:center;padding:30px 10px;color:var(--muted);font-size:13px;}

/* ---------- Print layout (used only for PDF export) ---------- */
#printArea{display:none;}
@media print{
  body *{visibility:hidden;}
  #printArea, #printArea *{visibility:visible;}
  #printArea{display:block;position:absolute;top:0;left:0;width:100%;padding:24px;}
  .print-title{font-size:20px;font-weight:800;margin-bottom:4px;}
  .print-meta{font-size:13px;color:#444;margin-bottom:18px;}
  .print-section-title{font-size:14px;font-weight:800;margin:18px 0 8px;border-bottom:2px solid #0d2140;padding-bottom:4px;}
  .print-present-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 16px;font-size:12.5px;}
  .print-agenda-item{margin-bottom:12px;}
  .print-agenda-item .pa-title{font-weight:700;font-size:13.5px;}
  .print-agenda-item .pa-details{font-size:12.5px;color:#333;margin-top:2px;white-space:pre-wrap;}
}
</style>

<link rel="stylesheet" href="desktop.css">
</head>
<body>
<script>KatiniAuth.requireRole(['admin','secretary']).then(async u => {
  if(!u) return;
  await loadMembers();
  renderPresentList();
  renderSavedList();
});</script>

<div id="app">

        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="logo-wrap">
        <img src="icon-192.png" alt="Katani Main Stage">
      </div>
      <div class="hdr-text">
        <h1>KATANI <span class="accent">MAIN STAGE</span><br>BODA SELF HELP GROUP</h1>
        <div class="admin-tag">Meeting Minutes</div>
      </div>
      <button class="icon-btn" onclick="location.href='notifications.html'" aria-label="Notifications">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span class="badge">8</span>

  <div class="main-card">

    <div class="page-head-row">
      <div class="page-head-left">
        <h2>Meeting Minutes</h2>

      </div>
    </div>

    <div class="form-card">
      <h3>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Meeting Details
      </h3>
      <div class="f-field">
        <label>Date of Meeting</label>
        <input type="date" id="mDate">
      </div>
      <div class="f-field">
        <label>Meeting Title</label>
        <input type="text" id="mTitle" placeholder="e.g. Ordinary Monthly Meeting">
      </div>
    </div>

    <div class="form-card">
      <h3>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Members Present
      </h3>
      <div class="present-head">
        <span class="present-count" id="presentCount">0 of 0 selected</span>
        <button type="button" class="select-all-btn" id="selectAllBtn" onclick="toggleSelectAll()">Select All</button>
      </div>
      <div class="present-list" id="presentList"></div>
    </div>

    <div class="form-card">
      <h3>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        Agenda
      </h3>
      <div id="agendaList"></div>
      <button type="button" class="add-agenda-btn" onclick="addAgendaItem()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add Agenda Item
      </button>
    </div>

    <div class="action-row">
      <button type="button" class="btn-save" onclick="saveMinutes()">Save Minutes</button>
      <button type="button" class="btn-pdf" onclick="generatePdf()">Generate PDF</button>
    </div>

    <div class="page-head-row">
      <div class="page-head-left">
        <h2>Saved Minutes</h2>
        <p>Previously recorded meetings.</p>
      </div>
    </div>
    <div id="savedList"></div>

  </div>

<nav class="bottom-nav">
  <button class="nav-item" onclick="KatiniAuth.goDashboard()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Dashboard
  </button>
  <button class="nav-item" onclick="location.href='members-directory.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    Members
  </button>
  <button class="nav-item" onclick="location.href='collections.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 7 16 12l7 5V7Z"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
    Collections
  </button>
  <button class="nav-item active" onclick="setActiveNav(this,'Minutes')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
    Minutes
  </button>
  <button class="nav-item" onclick="location.href='index.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/></svg>
    More
  </button>
</nav>

<div id="toast"></div>

</div>

<!-- Hidden print-only layout, populated before window.print() -->
<div id="printArea">
  <div class="print-title" id="p-title">&nbsp;</div>
  <div class="print-meta" id="p-meta">&nbsp;</div>
  <div class="print-section-title">Members Present</div>
  <div class="print-present-grid" id="p-present"></div>
  <div class="print-section-title">Agenda</div>
  <div id="p-agenda"></div>
</div>

<script>
let toastTimer;
function showToast(msg){
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
}
function setActiveNav(el,label){
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
}
function initials(name){
  return String(name || '?').trim().split(/\s+/).slice(0,2).map(w => w[0]).join('').toUpperCase();
}
function escapeHtml(str){
  return String(str || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

let directoryMembers = [];
let agendaCount = 0;

async function loadMembers(){
  directoryMembers = (await KatiniAuth.getUsers())
    .filter(u => u.role === 'member')
    .map(u => ({ id: u.memberId, name: u.name }));
}

function renderPresentList(){
  const wrap = document.getElementById('presentList');
  if(directoryMembers.length === 0){
    wrap.innerHTML = '<div class="empty-state">No members found in the directory yet.</div>';
    updatePresentCount();
    return;
  }
  wrap.innerHTML = directoryMembers.map(m => `
    <label class="present-row">
      <input type="checkbox" class="present-check" value="${m.id}" onchange="updatePresentCount()">
      <div class="pr-avatar">${initials(m.name)}</div>
      <div class="pr-info">
        <div class="pr-name">${escapeHtml(m.name)}</div>
        <div class="pr-id">${m.id}</div>
      </div>
    </label>
  `).join('');
  updatePresentCount();
}

function updatePresentCount(){
  const total = directoryMembers.length;
  const checked = document.querySelectorAll('.present-check:checked').length;
  document.getElementById('presentCount').textContent = checked + ' of ' + total + ' selected';
  document.getElementById('selectAllBtn').textContent = (checked === total && total > 0) ? 'Deselect All' : 'Select All';
}

function toggleSelectAll(){
  const boxes = document.querySelectorAll('.present-check');
  const allChecked = document.querySelectorAll('.present-check:checked').length === boxes.length;
  boxes.forEach(b => b.checked = !allChecked);
  updatePresentCount();
}

function addAgendaItem(titleVal, detailsVal){
  agendaCount++;
  const id = 'agenda-' + agendaCount;
  const div = document.createElement('div');
  div.className = 'agenda-item';
  div.id = id;
  div.innerHTML = `
    <div class="ai-num">
      <span>Agenda Item</span>
      <button type="button" class="ai-remove" onclick="removeAgendaItem('${id}')">Remove</button>
    </div>
    <div class="f-field">
      <label>Title</label>
      <input type="text" class="agenda-title" placeholder="e.g. Treasurer's Report">
    </div>
    <div class="f-field">
      <label>Details</label>
      <textarea class="agenda-details" placeholder="Details discussed under this item..."></textarea>
    </div>
  `;
  document.getElementById('agendaList').appendChild(div);
  if(titleVal !== undefined) div.querySelector('.agenda-title').value = titleVal;
  if(detailsVal !== undefined) div.querySelector('.agenda-details').value = detailsVal;
}
function removeAgendaItem(id){
  const el = document.getElementById(id);
  if(el) el.remove();
}

function collectAgenda(){
  return Array.from(document.querySelectorAll('.agenda-item')).map(el => ({
    title: el.querySelector('.agenda-title').value.trim(),
    details: el.querySelector('.agenda-details').value.trim()
  })).filter(a => a.title || a.details);
}

function collectPresent(){
  return Array.from(document.querySelectorAll('.present-check:checked')).map(cb => {
    const m = directoryMembers.find(x => x.id === cb.value);
    return { memberId: cb.value, name: m ? m.name : cb.value };
  });
}

function clearForm(){
  document.getElementById('mDate').value = '';
  document.getElementById('mTitle').value = '';
  document.querySelectorAll('.present-check').forEach(cb => cb.checked = false);
  document.getElementById('agendaList').innerHTML = '';
  agendaCount = 0;
  updatePresentCount();
}

async function saveMinutes(){
  const date = document.getElementById('mDate').value;
  const title = document.getElementById('mTitle').value.trim();
  const membersPresent = collectPresent();
  const agenda = collectAgenda();
  const session = KatiniAuth.getCurrentUser();

  const result = await KatiniAuth.addMinutes({
    meetingDate: date,
    title: title,
    membersPresent: membersPresent,
    agenda: agenda,
    recordedBy: session ? session.name : ''
  });

  if(!result.success){
    showToast(result.message);
    return;
  }
  showToast('Minutes saved');
  renderSavedList();
}

function fillPrintArea(rec){
  document.getElementById('p-title').textContent = rec.title || 'Meeting Minutes';
  const dateStr = rec.meetingDate ? new Date(rec.meetingDate + 'T00:00:00').toDateString() : '\u2014';
  document.getElementById('p-meta').textContent = 'Katani Main Stage \u2014 Boda Self Help Group  |  Date: ' + dateStr + '  |  Members Present: ' + (rec.membersPresent || []).length;

  const presentWrap = document.getElementById('p-present');
  if(!rec.membersPresent || rec.membersPresent.length === 0){
    presentWrap.innerHTML = '<div>No members marked present.</div>';
  } else {
    presentWrap.innerHTML = rec.membersPresent.map(m => `<div>&#9744; ${escapeHtml(m.name)}</div>`).join('');
  }

  const agendaWrap = document.getElementById('p-agenda');
  if(!rec.agenda || rec.agenda.length === 0){
    agendaWrap.innerHTML = '<div>No agenda items recorded.</div>';
  } else {
    agendaWrap.innerHTML = rec.agenda.map((a, i) => `
      <div class="print-agenda-item">
        <div class="pa-title">${i+1}. ${escapeHtml(a.title || 'Untitled item')}</div>
        <div class="pa-details">${escapeHtml(a.details || '')}</div>
      </div>
    `).join('');
  }
}

function generatePdf(){
  const rec = {
    title: document.getElementById('mTitle').value.trim() || 'Meeting Minutes',
    meetingDate: document.getElementById('mDate').value,
    membersPresent: collectPresent(),
    agenda: collectAgenda()
  };
  fillPrintArea(rec);
  setTimeout(() => window.print(), 80);
}

async function printSaved(id){
  const rec = await KatiniAuth.getMinutesById(id);
  if(!rec) return;
  fillPrintArea(rec);
  setTimeout(() => window.print(), 80);
}

async function removeSaved(id){
  await KatiniAuth.deleteMinutes(id);
  renderSavedList();
  showToast('Minutes deleted');
}

async function renderSavedList(){
  const wrap = document.getElementById('savedList');
  const list = await KatiniAuth.getMinutes();
  if(list.length === 0){
    wrap.innerHTML = '<div class="empty-state">No minutes saved yet.</div>';
    return;
  }
  wrap.innerHTML = list.map(rec => {
    const dateStr = rec.meetingDate ? new Date(rec.meetingDate + 'T00:00:00').toDateString() : '\u2014';
    return `
    <div class="saved-card">
      <h4>${escapeHtml(rec.title)}</h4>
      <div class="sc-sub">${dateStr} &middot; ${(rec.membersPresent||[]).length} present &middot; ${(rec.agenda||[]).length} agenda items</div>
      <div class="sc-actions">
        <button class="sc-btn" onclick="printSaved('${rec.id}')">View / PDF</button>
        <button class="sc-btn danger" onclick="removeSaved('${rec.id}')">Delete</button>
      </div>
    </div>
  `;
  }).join('');
}

addAgendaItem();
document.getElementById('mDate').valueAsDate = new Date();
</script>
</body>
</html>
