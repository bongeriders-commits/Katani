<html lang="en">
<head>

<style>
:root{
  --navy:#0d2140;
  --navy-dark:#0a1830;
  --navy-card:#11294f;
  --gold:#f5a623;
  --green:#2e7d32;
  --red:#c0392b;
  --blue:#1565c0;
  --gray-bg:#f4f6f9;
  --text-light:#c9d3e0;
  --border:#e3e7ee;
  --muted:#6b7685;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;font-family:'Segoe UI',Roboto,-apple-system,BlinkMacSystemFont,sans-serif;}
html,body{height:100%;}
body{background:#1a1a1a;color:#1a1a1a;overflow-x:hidden;}

#app{
  max-width:480px;margin:0 auto;background:var(--gray-bg);
  min-height:100vh;position:relative;box-shadow:0 0 40px rgba(0,0,0,0.4);
  padding-bottom:96px;
}

/* ---------- Header (shared) ---------- */
header.topbar{
  background:
    linear-gradient(180deg, rgba(13,33,64,0.65) 0%, rgba(13,33,64,0.8) 70%, rgba(13,33,64,0.94) 100%),
    url('hero-bg.jpg');
  background-size:cover;background-position:center;
  padding:16px 18px 44px;position:relative;
}
.hdr-row{display:flex;align-items:flex-start;gap:14px;}
.icon-btn{
  width:38px;height:38px;display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,0.08);border:none;border-radius:10px;color:#fff;cursor:pointer;
  flex-shrink:0;position:relative;
}
.icon-btn svg{width:20px;height:20px;}
.badge{
  position:absolute;top:-6px;right:-6px;background:var(--gold);color:var(--navy-dark);
  font-size:10px;font-weight:800;width:18px;height:18px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;border:2px solid var(--navy-dark);
}
.logo-wrap{
  width:74px;height:74px;border-radius:50%;overflow:hidden;border:3px solid #fff;
  box-shadow:0 4px 14px rgba(0,0,0,0.35);flex-shrink:0;background:#fff;
}
.logo-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
.hdr-text{flex:1;min-width:0;}
.hdr-text h1{color:#fff;font-size:17.5px;font-weight:800;line-height:1.3;text-transform:uppercase;}
.hdr-text h1 .accent{color:var(--gold);}

/* ---------- Main content overlap card ---------- */
.main-card{
  background:#fff;border-radius:22px 22px 0 0;margin-top:-28px;position:relative;z-index:2;
  padding:22px 18px 4px;
}

/* ---------- Page head row ---------- */
.page-head-row{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:18px;flex-wrap:wrap;}
.page-head-left h2{font-size:21px;font-weight:800;color:var(--navy-dark);}
.page-head-left p{font-size:12.5px;color:var(--muted);margin-top:3px;}
.btn-mark{
  background:var(--navy);color:#fff;border:none;border-radius:12px;padding:11px 16px;
  font-size:12.5px;font-weight:700;display:flex;align-items:center;gap:8px;cursor:pointer;
  white-space:nowrap;box-shadow:0 6px 16px rgba(13,33,64,0.25);
}
.btn-mark svg{width:15px;height:15px;}

/* ---------- Filter tabs ---------- */
.tab-scroll{display:flex;gap:9px;overflow-x:auto;padding-bottom:4px;margin-bottom:18px;scrollbar-width:none;}
.tab-scroll::-webkit-scrollbar{display:none;}
.tab-pill{
  display:flex;align-items:center;gap:7px;padding:10px 14px;border-radius:11px;border:1.5px solid var(--border);
  background:var(--gray-bg);font-size:12.5px;font-weight:700;color:var(--navy-dark);white-space:nowrap;cursor:pointer;
  flex-shrink:0;position:relative;
}
.tab-pill.active{background:var(--navy);border-color:var(--navy);color:#fff;box-shadow:0 3px 0 var(--gold);}
.tab-dot{width:7px;height:7px;border-radius:50%;background:var(--gold);flex-shrink:0;}

/* ---------- Notification list ---------- */
.notif-card{
  background:#fff;border:1.5px solid var(--border);border-radius:16px;padding:16px;
  display:flex;align-items:flex-start;gap:14px;margin-bottom:12px;
}
.notif-icon{
  width:48px;height:48px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  position:relative;
}
.notif-icon svg{width:22px;height:22px;color:#fff;}
.notif-icon.green{background:var(--green);}
.notif-icon.navy{background:var(--navy);}
.notif-icon.gold{background:var(--gold);}
.notif-icon.red{background:var(--red);}
.notif-icon .mini-badge{
  position:absolute;bottom:-2px;right:-2px;width:17px;height:17px;border-radius:50%;background:#fff;
  border:2px solid #fff;display:flex;align-items:center;justify-content:center;
}
.notif-icon .mini-badge svg{width:12px;height:12px;color:var(--green);}
.notif-body{flex:1;min-width:0;}
.notif-body h4{font-size:14px;font-weight:800;color:var(--navy-dark);margin-bottom:3px;}
.notif-body p{font-size:12.5px;color:var(--muted);line-height:1.5;}
.notif-time{display:flex;align-items:center;gap:5px;margin-top:9px;font-size:11px;color:#9aa3b0;font-weight:600;}
.notif-time svg{width:12px;height:12px;}
.notif-right{flex-shrink:0;padding-top:4px;}
.unread-dot{width:9px;height:9px;border-radius:50%;background:var(--gold);}
.read-dot{width:9px;height:9px;border-radius:50%;background:#d3d8e0;}

/* ---------- Bottom nav (member-facing) ---------- */
.bottom-nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--navy);
  display:grid;grid-template-columns:repeat(5,1fr);box-shadow:0 -4px 20px rgba(0,0,0,0.2);
  padding:10px 0 max(10px, env(safe-area-inset-bottom));z-index:50;align-items:center;
}
.nav-item{
  display:flex;flex-direction:column;align-items:center;gap:5px;background:none;border:none;
  cursor:pointer;color:var(--text-light);padding:6px 4px;font-size:10px;font-weight:700;position:relative;
}
.nav-item svg{width:21px;height:21px;}
.nav-item.active{color:var(--gold);}
.nav-item .nb-badge{
  position:absolute;top:-2px;right:14px;background:var(--gold);color:var(--navy-dark);
  font-size:9px;font-weight:800;width:15px;height:15px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;border:2px solid var(--navy);
}

/* Toast */
#toast{
  position:fixed;bottom:110px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--navy-dark);color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;
  z-index:400;opacity:0;transition:all .3s ease;pointer-events:none;box-shadow:0 8px 20px rgba(0,0,0,0.3);
  max-width:400px;text-align:center;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ---------- Install app bar (PWA) ---------- */
.install-bar{
  position:fixed;left:50%;bottom:-140px;transform:translateX(-50%);width:100%;max-width:480px;
  background:var(--navy,#0d2140);color:#fff;z-index:500;padding:14px 16px;
  box-shadow:0 -6px 24px rgba(0,0,0,0.3);display:flex;align-items:center;gap:12px;
  transition:bottom .35s ease;border-radius:16px 16px 0 0;
}
.install-bar.show{bottom:0;}
.install-bar-icon{
  width:38px;height:38px;border-radius:10px;background:rgba(255,255,255,0.1);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;overflow:hidden;
}
.install-bar-icon img{width:100%;height:100%;object-fit:cover;}
.install-bar-text{flex:1;min-width:0;}
.install-bar-text strong{display:block;font-size:13px;font-weight:800;}
.install-bar-text span{display:block;font-size:11px;color:var(--text-light,#c9d3e0);margin-top:2px;line-height:1.35;}
.install-bar-btn{
  background:var(--gold,#f5a623);color:var(--navy-dark,#0a1830);border:none;border-radius:10px;
  padding:9px 14px;font-size:12px;font-weight:800;cursor:pointer;white-space:nowrap;flex-shrink:0;
}
.install-bar-close{
  background:none;border:none;color:#c9d3e0;font-size:20px;line-height:1;cursor:pointer;padding:2px 4px;flex-shrink:0;
}
</style>
<link rel="stylesheet" href="desktop.css">
</head>
<body>
<script>KatiniAuth.requireRole(['admin','member']);</script>

<div id="app">

  <header class="topbar">
    <div class="hdr-row">
      <button class="icon-btn" onclick="location.href='index.html'" aria-label="Menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="logo-wrap">
        <img src="icon-192.png" alt="Katani Main Stage">
      </div>
      <div class="hdr-text">
        <h1>KATANI <span class="accent">MAIN STAGE</span><br>BODA SELF HELP GROUP</h1>
      </div>
      <button class="icon-btn" onclick="showToast('8 new notifications')" aria-label="Notifications">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span class="badge">8</span>
      </button>
    </div>
  </header>

  <div class="main-card">

    <div class="page-head-row">
      <div class="page-head-left">
        <h2>Notifications</h2>
        <p>Stay updated with important alerts and activities.</p>
      </div>
      <button class="btn-mark" onclick="markAllRead()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="8 12 11 15 16 9"/></svg>
        Mark all as read
      </button>
    </div>

    <div class="tab-scroll">
      <button class="tab-pill active" data-filter="all" onclick="setTab(this)">All (8)</button>
      <button class="tab-pill" data-filter="unread" onclick="setTab(this)">Unread (8) <span class="tab-dot"></span></button>
      <button class="tab-pill" data-filter="payments" onclick="setTab(this)">Payments (3)</button>
      <button class="tab-pill" data-filter="announcements" onclick="setTab(this)">Announcements (3)</button>
      <button class="tab-pill" data-filter="system" onclick="setTab(this)">System (2)</button>
    </div>

    <div id="notifList"></div>

  </div>
</div>

<div id="toast"></div>

<nav class="bottom-nav">
  <button class="nav-item" onclick="location.href='index.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Home
  </button>
  <button class="nav-item" onclick="location.href='members-directory.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    Members
  </button>
  <button class="nav-item" onclick="setActiveNav(this,'Collections')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 7 16 12l7 5V7Z"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
    Collections
  </button>
  <button class="nav-item active" onclick="setActiveNav(this,'Notifications')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
    <span class="nb-badge" id="navBadge">8</span>
    Notifications
  </button>
  <button class="nav-item" onclick="location.href='members-portal.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    Profile
  </button>
</nav>

<script>
let toastTimer;
function showToast(msg){
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
}
function setActiveNav(el,label){
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
  showToast(label);
}

/* -------- Notification data -------- */
const notifications = [];

const icons = {
  wallet:'<path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/>',
  megaphone:'<path d="m3 11 18-5v12L3 14v-3z"/><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/>',
  heart:'<path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>',
  warning:'<path d="m10.29 3.86-8.18 14.14A1.5 1.5 0 0 0 3.4 20h17.2a1.5 1.5 0 0 0 1.29-2L13.71 3.86a1.5 1.5 0 0 0-2.42 0Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>',
  userplus:'<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="16" y1="11" x2="22" y2="11"/>',
  document:'<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="17" x2="9" y2="13"/><line x1="12" y1="17" x2="12" y2="11"/><line x1="15" y1="17" x2="15" y2="15"/>'
};

function renderNotifications(list){
  const wrap = document.getElementById('notifList');
  if(list.length === 0){
    wrap.innerHTML = '<div style="text-align:center;padding:40px 10px;color:var(--muted);font-size:13px;">No notifications in this category.</div>';
    return;
  }
  const esc = KatiniAuth.escapeHtml;
  wrap.innerHTML = list.map(n => `
    <div class="notif-card" data-id="${n.id}" onclick="markRead(${n.id})">
      <div class="notif-icon ${n.color}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${icons[n.icon]}</svg>
        ${n.badge === 'check' ? '<span class="mini-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>' : ''}
      </div>
      <div class="notif-body">
        <h4>${esc(n.title)}</h4>
        <p>${esc(n.body)}</p>
        <div class="notif-time">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          ${esc(n.time)}
        </div>
      </div>
      <div class="notif-right">
        <span class="${n.unread ? 'unread-dot' : 'read-dot'}"></span>
      </div>
    </div>
  `).join('');
}

function setTab(el){
  document.querySelectorAll('.tab-pill').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  applyFilter();
}

function applyFilter(){
  const filter = document.querySelector('.tab-pill.active').dataset.filter;
  let list = notifications;
  if(filter === 'unread') list = notifications.filter(n => n.unread);
  else if(filter !== 'all') list = notifications.filter(n => n.category === filter);
  renderNotifications(list);
}

function updateUnreadCount(){
  const count = notifications.filter(n => n.unread).length;
  document.getElementById('navBadge').textContent = count;
  if(count === 0){
    document.getElementById('navBadge').style.display = 'none';
  }
}

function markRead(id){
  const n = notifications.find(x => x.id === id);
  if(n && n.unread){
    n.unread = false;
    applyFilter();
    updateUnreadCount();
  }
}

function markAllRead(){
  notifications.forEach(n => n.unread = false);
  applyFilter();
  updateUnreadCount();
  showToast('All notifications marked as read');
}

renderNotifications(notifications);
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js').catch(() => {});
  });
}
</script>
<div class="install-bar" id="installBar">
  <div class="install-bar-icon"><img src="icon-192.png" alt=""></div>
  <div class="install-bar-text">
    <strong>Install Katani Main Stage</strong>
    <span id="installBarMsg">Add it to your home screen for one-tap, offline-ready access.</span>
  </div>
  <button class="install-bar-btn" id="installBarBtn" onclick="triggerInstall()">Install</button>
  <button class="install-bar-close" onclick="dismissInstallBar()" aria-label="Dismiss">&times;</button>
</div>
<script>
/* ---------- Install app prompt (PWA) ---------- */
(function(){
  const bar = document.getElementById('installBar');
  const btn = document.getElementById('installBarBtn');
  const msg = document.getElementById('installBarMsg');
  let deferredPrompt = null;

  function isStandalone(){
    return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
  }
  function isIos(){
    return /iphone|ipad|ipod/i.test(window.navigator.userAgent);
  }

  if(!isStandalone() && !sessionStorage.getItem('kms_install_dismissed')){
    if(isIos()){
      msg.textContent = 'Tap Share, then "Add to Home Screen" to install.';
      btn.style.display = 'none';
      bar.classList.add('show');
    } else {
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        bar.classList.add('show');
      });
    }
  }

  window.triggerInstall = function(){
    if(!deferredPrompt) return;
    bar.classList.remove('show');
    deferredPrompt.prompt();
    deferredPrompt.userChoice.finally(() => { deferredPrompt = null; });
  };
  window.dismissInstallBar = function(){
    bar.classList.remove('show');
    sessionStorage.setItem('kms_install_dismissed', '1');
  };
  window.addEventListener('appinstalled', () => {
    bar.classList.remove('show');
  });
})();
</script>
